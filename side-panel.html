<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cookie Canary</title>
    <link rel="stylesheet" href="side-panel.css">
</head>
<body>
    <header>
        <h1>Cookie Cutter</h1>
    </header>

    <section class="stats-row">
        <div class="stat" id="stat-active">
            <span class="stat-value" id="val-active">0</span>
            <span class="stat-label">Active</span>
        </div>
        <div class="stat" id="stat-added">
            <span class="stat-value" id="val-added">0</span>
            <span class="stat-label">Added</span>
        </div>
        <div class="stat" id="stat-updated">
            <span class="stat-value" id="val-updated">0</span>
            <span class="stat-label">Updated</span>
        </div>
        <div class="stat" id="stat-removed">
            <span class="stat-value" id="val-removed">0</span>
            <span class="stat-label">Removed</span>
        </div>
        <div class="stat" id="stat-expired">
            <span class="stat-value" id="val-expired">0</span>
            <span class="stat-label">Expired</span>
        </div>
    </section>

    <section class="chart-section">
        <canvas id="chart"></canvas>
    </section>

    <section class="legend">
        <span class="legend-item added">Added</span>
        <span class="legend-item updated">Updated</span>
        <span class="legend-item removed">Removed</span>
    </section>

    <section id="cookie-list"></section>

    <footer class="author">
        by <a href="https://vilimpoc.org">Max Vilimpoc</a> and <a href="https://claude.ai">Claude Code</a>
    </footer>

    <script src="side-panel.js" type="module"></script>
</body>
</html>
