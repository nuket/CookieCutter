<html>
<head>
    <title>Cookie Monitor</title>

    <link rel="stylesheet" href="manager.css"/>

    <script src="libs/lodash.min.js"></script>
    <script src="libs/d3.v3.min.js"></script>


    <script src="manager.js"></script>

    <!-- Unfortunately this makes our whole extension less secure, via CSP and unsafe-eval. :( -->
    <!-- Because although Google "champions" open-source, they won't just release their Charts code. -->
    <!-- <script src="https://www.google.com/jsapi?autoload={'modules':[{'name':'visualization','version':'1','packages':['timeline']}]}"></script> -->
</head>

<body>
<h2>Cookie Monitor</h2>

<div>
    Here be the visualizations.

    <svg class="timeline"></svg>
</div>

<div>
    Here be the old cookie example.



    <button id="remove_button">DELETE ALL!</button>
    <div id="filter_div">
        Filter: <input id="filter" type="text">
        <button>x</button>
    </div>
    <br/>

    <div id="summary_div">
        Showing <span id="filter_count"></span> of <span id="total_count"></span> cookie domains.
        <span id="delete_all_button"></span>
    </div>
    <br/>
    <table id="cookies">
        <tr class="header">
            <th>Name</th>
            <th>#Cookies</th>
        </tr>
    </table>
</div>

</body>
</html>
